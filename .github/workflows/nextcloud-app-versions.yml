name: "Nextcloud App Version Check"

on:
  schedule:
    - cron: "0 8 * * 4" # Thursday 08:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  check-versions:
    name: Check for app updates
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for updates
        id: check
        run: |
          set +e
          output=$(./scripts/check-nextcloud-app-versions.sh 2>&1)
          exit_code=$?
          echo "$output"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

          # Extract update summary for PR body
          if [ "$exit_code" -eq 2 ]; then
            # Capture lines with " -> " (version changes)
            changes=$(echo "$output" | grep ' -> ' | sed 's/^  //')
            {
              echo "changes<<EOF"
              echo "$changes"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Update manifest
        if: steps.check.outputs.exit_code == '2'
        run: ./scripts/check-nextcloud-app-versions.sh --update

      - name: Create PR
        if: steps.check.outputs.exit_code == '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/nextcloud-app-updates-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add apps/manifests/nextcloud/app-versions.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(nextcloud): update app versions

          Automated weekly check found new compatible versions.

          Changes:
          ${{ steps.check.outputs.changes }}"

          git push origin "$BRANCH"

          # Build PR body with update table
          gh pr create \
            --title "chore(nextcloud): update app versions" \
            --body "$(cat <<'EOF'
          ## Nextcloud App Updates

          Automated weekly check found new compatible app versions.

          ### Changes

          ${{ steps.check.outputs.changes }}

          ### Action Required

          1. Review the version changes above
          2. Merge this PR
          3. Deploy to dev: `./apps/deploy-nextcloud.sh -e dev -t <tenant>`
          4. Verify apps work correctly
          5. Deploy to prod

          ---
          🤖 Generated by [Nextcloud App Version Check](.github/workflows/nextcloud-app-versions.yml)
          EOF
          )" \
            --label "dependencies" \
            --label "nextcloud"
