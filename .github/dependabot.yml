version: 2
updates:
  # npm: Admin Portal
  - package-ecosystem: "npm"
    directory: "/apps/admin-portal"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    groups:
      all-deps:
        patterns: ["*"]
    ignore:
      - dependency-name: "openid-client"
        versions: [">=6"]

  # npm: Account Portal
  - package-ecosystem: "npm"
    directory: "/apps/account-portal"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    groups:
      all-deps:
        patterns: ["*"]
    ignore:
      - dependency-name: "openid-client"
        versions: [">=6"]

  # npm: Calendar Automation
  - package-ecosystem: "npm"
    directory: "/apps/calendar-automation"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    groups:
      all-deps:
        patterns: ["*"]

  # Terraform: Phase 1 (cluster, VPN, TURN)
  - package-ecosystem: "terraform"
    directory: "/phase1"
    schedule:
      interval: "weekly"
      day: "tuesday"
    labels:
      - "dependencies"
      - "terraform"
    groups:
      all-providers:
        patterns: ["*"]

  # Terraform: Infra (K8s infra layer)
  - package-ecosystem: "terraform"
    directory: "/infra"
    schedule:
      interval: "weekly"
      day: "tuesday"
    labels:
      - "dependencies"
      - "terraform"
    groups:
      all-providers:
        patterns: ["*"]

  # Terraform: CI server
  - package-ecosystem: "terraform"
    directory: "/ci/terraform"
    schedule:
      interval: "weekly"
      day: "tuesday"
    labels:
      - "dependencies"
      - "terraform"
    groups:
      all-providers:
        patterns: ["*"]

  # Docker: Admin Portal
  - package-ecosystem: "docker"
    directory: "/apps/admin-portal"
    schedule:
      interval: "weekly"
      day: "wednesday"
    labels:
      - "dependencies"
      - "docker"
    groups:
      base-images:
        patterns: ["*"]
    ignore:
      # Pinned to node 22 LTS. Remove when ready to upgrade — tracking issue
      # gates the next major; the prior 20→25 jump broke CJS/ESM interop.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  # Docker: Account Portal
  - package-ecosystem: "docker"
    directory: "/apps/account-portal"
    schedule:
      interval: "weekly"
      day: "wednesday"
    labels:
      - "dependencies"
      - "docker"
    groups:
      base-images:
        patterns: ["*"]
    ignore:
      # Pinned to node 22 LTS. Remove when ready to upgrade — tracking issue
      # gates the next major; the prior 20→25 jump broke CJS/ESM interop.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  # Docker: Roundcube
  - package-ecosystem: "docker"
    directory: "/apps/docker/roundcube"
    schedule:
      interval: "weekly"
      day: "wednesday"
    labels:
      - "dependencies"
      - "docker"
    groups:
      base-images:
        patterns: ["*"]
