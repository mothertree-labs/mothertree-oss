---
- name: Configure SMTP Relay on VPN Server
  hosts: vpn_servers
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Postfix
      apt:
        name: postfix
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    # Certbot + Postfix inbound TLS (Let's Encrypt HTTP-01; port 80 only during certbot)
    - name: Install Certbot (apt)
      apt:
        name: certbot
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive
      when: tls_email is defined and tls_email | length > 0

    - name: Create Certbot renewal-hooks directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /etc/letsencrypt/renewal-hooks/pre
        - /etc/letsencrypt/renewal-hooks/post
        - /etc/letsencrypt/renewal-hooks/deploy
      when: tls_email is defined and tls_email | length > 0

    - name: Deploy Certbot pre-hook (allow port 80 for HTTP-01)
      copy:
        content: |
          #!/bin/bash
          ufw allow 80/tcp comment 'Certbot HTTP-01 temporary'
        dest: /etc/letsencrypt/renewal-hooks/pre/allow-port-80.sh
        mode: '0755'
      when: tls_email is defined and tls_email | length > 0

    - name: Deploy Certbot post-hook (deny port 80 after renewal)
      copy:
        content: |
          #!/bin/bash
          yes | ufw delete allow 80/tcp 2>/dev/null || true
        dest: /etc/letsencrypt/renewal-hooks/post/deny-port-80.sh
        mode: '0755'
      when: tls_email is defined and tls_email | length > 0

    - name: Deploy Certbot deploy-hook (reload Postfix after renewal)
      copy:
        content: |
          #!/bin/bash
          systemctl reload postfix
        dest: /etc/letsencrypt/renewal-hooks/deploy/postfix-reload.sh
        mode: '0755'
      when: tls_email is defined and tls_email | length > 0

    - name: Check if Let's Encrypt cert already exists
      stat:
        path: "/etc/letsencrypt/live/{{ mx_mail_host_fqdn }}/fullchain.pem"
      register: cert_file
      when: tls_email is defined and tls_email | length > 0

    - name: Obtain Let's Encrypt certificate for MX mail host (HTTP-01)
      block:
        - name: Allow port 80 temporarily for Certbot
          ufw:
            rule: allow
            port: '80'
            proto: tcp
            comment: 'Certbot HTTP-01 temporary'

        - name: Run certbot certonly (standalone)
          command: >
            certbot certonly --standalone --non-interactive --agree-tos
            --email {{ tls_email }}
            -d {{ mx_mail_host_fqdn }}
            --preferred-challenges http
          register: certbot_result
          changed_when: certbot_result.rc == 0 and 'Successfully received certificate' in certbot_result.stdout
          failed_when: certbot_result.rc != 0

        - name: Remove temporary UFW allow 80
          ufw:
            rule: allow
            port: '80'
            proto: tcp
            delete: yes
      when: tls_email is defined and tls_email | length > 0 and not (cert_file is defined and cert_file.stat.exists)

    - name: Configure Postfix as internal relay
      template:
        src: postfix-relay-main.cf.j2
        dest: /etc/postfix/main.cf
        owner: root
        group: root
        mode: '0644'
      notify: restart postfix

    - name: Deploy SASL credentials for SES SMTP relay
      copy:
        content: "[{{ ses_smtp_endpoint }}]:587 {{ ses_smtp_username }}:{{ ses_smtp_password }}\n"
        dest: /etc/postfix/sasl_passwd
        owner: root
        group: root
        mode: '0600'
      no_log: true
      notify: postmap sasl credentials
      when: ses_smtp_endpoint is defined and ses_smtp_endpoint | length > 0

    - name: Deploy TLS policy map (enforce strict TLS for SES only)
      copy:
        content: "[{{ ses_smtp_endpoint }}]:587    secure\n"
        dest: /etc/postfix/tls_policy
        owner: root
        group: root
        mode: '0644'
      notify: postmap tls policy
      when: ses_smtp_endpoint is defined and ses_smtp_endpoint | length > 0

    - name: Remove SES config files when SES is not configured
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/postfix/sasl_passwd
        - /etc/postfix/sasl_passwd.db
        - /etc/postfix/tls_policy
        - /etc/postfix/tls_policy.db
      when: ses_smtp_endpoint is not defined or ses_smtp_endpoint | length == 0

    - name: Deploy transport map for inbound mail routing
      template:
        src: postfix-transport.j2
        dest: /etc/postfix/transport
        owner: root
        group: root
        mode: '0644'
      notify: rebuild postfix maps
      when: tenant_domains is defined and tenant_domains | length > 0

    - name: Deploy relay_domains for inbound mail
      template:
        src: postfix-relay-domains.j2
        dest: /etc/postfix/relay_domains
        owner: root
        group: root
        mode: '0644'
      notify: rebuild postfix maps
      when: tenant_domains is defined and tenant_domains | length > 0

    - name: Ensure Postfix is enabled and started
      systemd:
        name: postfix
        enabled: yes
        state: started

    - name: Allow SMTP from internal networks (10.0.0.0/8)
      ufw:
        rule: allow
        port: '25'
        proto: tcp
        from_ip: 10.0.0.0/8
        comment: 'SMTP from K8s pod network'

    - name: Allow SMTP from internal networks (172.16.0.0/12)
      ufw:
        rule: allow
        port: '25'
        proto: tcp
        from_ip: 172.16.0.0/12
        comment: 'SMTP from Docker/K8s networks'

    - name: Allow SMTP from internal networks (192.168.0.0/16)
      ufw:
        rule: allow
        port: '25'
        proto: tcp
        from_ip: 192.168.0.0/16
        comment: 'SMTP from VPC private networks'

    - name: Allow SMTP from internet (inbound mail)
      ufw:
        rule: allow
        port: '25'
        proto: tcp
        comment: 'SMTP inbound mail from internet'
      when: tenant_domains is defined and tenant_domains | length > 0

    # microsocks SOCKS5 proxy — allows in-cluster Blackbox Exporter to probe
    # external FQDNs via the VPN server, bypassing kube-proxy short-circuit
    # that skips the NodeBalancer PROXY protocol header injection.
    - name: Install Docker for microsocks container
      apt:
        name: docker.io
        state: present
      when: vpn_private_ip is defined and vpn_private_ip | length > 0

    - name: Ensure Docker is enabled and started
      systemd:
        name: docker
        enabled: yes
        state: started
      when: vpn_private_ip is defined and vpn_private_ip | length > 0

    - name: Run microsocks SOCKS5 proxy container
      community.docker.docker_container:
        name: microsocks
        image: chrll/microsocks:1.0.4
        state: started
        restart_policy: always
        network_mode: host
        command: >-
          -i {{ vpn_private_ip }} -p 1080
          {% if microsocks_password is defined and microsocks_password | length > 0 %}
          -u blackbox -P {{ microsocks_password }}
          {% endif %}
      when: vpn_private_ip is defined and vpn_private_ip | length > 0

    - name: Allow SOCKS5 proxy from Linode private network
      ufw:
        rule: allow
        port: '1080'
        proto: tcp
        from_ip: 192.168.0.0/16
        comment: 'microsocks SOCKS5 for Blackbox Exporter probes'
      when: vpn_private_ip is defined and vpn_private_ip | length > 0

  handlers:
    - name: postmap sasl credentials
      command: postmap /etc/postfix/sasl_passwd
      notify: restart postfix

    - name: postmap tls policy
      command: postmap /etc/postfix/tls_policy
      notify: restart postfix

    - name: rebuild postfix maps
      shell: |
        postmap /etc/postfix/transport 2>/dev/null || true
        postmap /etc/postfix/relay_domains 2>/dev/null || true
      notify: restart postfix

    - name: restart postfix
      systemd:
        name: postfix
        state: restarted

# =============================================================================
# VPN Networking: Unbound DNS, OpenVPN routes, iptables NAT
# Ensures VPN clients can reach K8s services (monitoring via NodePort,
# web services via NodeBalancer) using internal DNS names.
# =============================================================================
- name: Configure VPN Networking (Unbound DNS, OpenVPN routes)
  hosts: vpn_servers
  become: yes

  tasks:
    - name: Skip VPN networking if cluster IPs not provided
      debug:
        msg: "Skipping VPN networking — cluster_node_ip and/or cluster_lb_ip not provided"
      when: cluster_node_ip is not defined or cluster_lb_ip is not defined

    # --- OpenVPN route push for K8s node subnet ---
    # VPN clients need a route to the K8s node subnet so they can reach
    # monitoring services (Grafana, Prometheus, Alertmanager) via NodePort.
    - name: Compute K8s node subnet
      set_fact:
        node_subnet: "{{ cluster_node_ip.split('.')[0:3] | join('.') }}.0"
      when: cluster_node_ip is defined

    - name: Update OpenVPN node subnet route push
      lineinfile:
        path: /etc/openvpn/server.conf
        regexp: '^push "route 192\.168\.\d+\.0 255\.255\.255\.0"'
        line: 'push "route {{ node_subnet }} 255.255.255.0"'
        insertafter: '^push "route '
      notify: restart openvpn deferred
      when: cluster_node_ip is defined

    # --- iptables NAT for VPN→node-subnet traffic ---
    # Without this MASQUERADE rule, nodes can't reply to VPN clients
    # because the VPN client IPs aren't routable from the node subnet.
    - name: Remove stale iptables MASQUERADE rules for old node subnets
      shell: |
        iptables -t nat -S POSTROUTING | grep -E '\-s {{ vpn_network_cidr }} .*\-d 192\.168\.[0-9]+\.[0-9]+\.0/24 .*\-j MASQUERADE' | while read -r rule; do
          iptables -t nat $(echo "$rule" | sed 's/^-A/-D/') || true
        done
      when: cluster_node_ip is defined and vpn_network_cidr is defined
      changed_when: false

    - name: Add iptables MASQUERADE for VPN to node subnet
      iptables:
        table: nat
        chain: POSTROUTING
        source: "{{ vpn_network_cidr }}"
        destination: "{{ node_subnet }}/24"
        out_interface: eth0
        jump: MASQUERADE
      notify: save iptables
      when: cluster_node_ip is defined and vpn_network_cidr is defined

    # --- Unbound DNS for internal service resolution ---
    # Monitoring services resolve to NODE_IP (NodePort access).
    # Web services resolve to CLUSTER_IP (NodeBalancer, bypasses Cloudflare for VPN debugging).
    # Unbound runs in Docker with unbound.conf mounted. We add a conf.d volume
    # for DNS overrides so the base config stays untouched.
    - name: Ensure Unbound conf.d directory exists
      file:
        path: /opt/unbound/conf.d
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: cluster_node_ip is defined

    - name: Add conf.d volume mount to Unbound docker-compose
      lineinfile:
        path: /opt/unbound/docker-compose.yml
        regexp: 'conf\.d:/opt/unbound/etc/unbound/conf\.d'
        line: '      - ./conf.d:/opt/unbound/etc/unbound/conf.d:ro'
        insertafter: 'unbound\.conf:/opt/unbound/etc/unbound/unbound\.conf'
      notify: recreate unbound
      when: cluster_node_ip is defined

    - name: Ensure Unbound includes conf.d (container path)
      lineinfile:
        path: /opt/unbound/unbound.conf
        regexp: 'include:.*conf\.d/\*\.conf'
        line: 'include: "/opt/unbound/etc/unbound/conf.d/*.conf"'
        insertbefore: '^stub-zone:'
      notify: restart unbound
      when: cluster_node_ip is defined

    - name: Deploy Unbound DNS configuration
      template:
        src: unbound-local-data.conf.j2
        dest: /opt/unbound/conf.d/local-data.conf
        owner: root
        group: root
        mode: '0644'
      notify: restart unbound
      when: cluster_node_ip is defined and cluster_lb_ip is defined and internal_dns_domain is defined

  handlers:
    - name: recreate unbound
      shell: cd /opt/unbound && docker-compose down && docker-compose up -d
      retries: 3
      delay: 2

    - name: restart unbound
      shell: cd /opt/unbound && docker-compose restart
      retries: 3
      delay: 2

    - name: save iptables
      shell: iptables-save > /etc/iptables/rules.v4

    # Deferred restart: nohup prevents SIGHUP when SSH session drops
    # (happens when connected via VPN tunnel — restarting OpenVPN kills the tunnel)
    - name: restart openvpn deferred
      shell: nohup sh -c 'sleep 1; systemctl restart openvpn@server' >/dev/null 2>&1 &
      async: 10
      poll: 0

- name: Configure TURN Server
  hosts: turn_servers
  become: yes
  vars:
    turn_realm: "matrix"
    # turn_shared_secret: REQUIRED - must be passed via --extra-vars
    # Source: tenants/<name>/<env>.secrets.yaml -> turn.shared_secret
    # Example: ansible-playbook playbook.yml -e "turn_shared_secret=<value>"
    turn_listening_port: 3478
    turn_alt_port: 3479
    turn_tls_port: 5349
    turn_alt_tls_port: 5350
    turn_min_port: 49152
    turn_max_port: 65535

  tasks:
    - name: Validate turn_shared_secret is provided
      fail:
        msg: "turn_shared_secret must be passed via --extra-vars (source: tenants/<name>/<env>.secrets.yaml -> turn.shared_secret)"
      when: turn_shared_secret is not defined or turn_shared_secret | length == 0

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Coturn
      apt:
        name: coturn
        state: present

    - name: Enable Coturn service
      systemd:
        name: coturn
        enabled: yes
        state: started

    - name: Create turnserver configuration directory
      file:
        path: /etc/turnserver
        state: directory
        owner: turnserver
        group: turnserver
        mode: '0755'

    - name: Generate turnserver configuration
      template:
        src: turnserver.conf.j2
        dest: /etc/turnserver/turnserver.conf
        owner: turnserver
        group: turnserver
        mode: '0644'
      notify: restart coturn

    - name: Create log directory
      file:
        path: /var/log/turnserver
        state: directory
        owner: turnserver
        group: turnserver
        mode: '0755'

    - name: Generate systemd service override
      template:
        src: coturn.service.j2
        dest: /etc/systemd/system/coturn.service
        mode: '0644'
      notify:
        - reload systemd
        - restart coturn

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: restart coturn
      systemd:
        name: coturn
        state: restarted

# =============================================================================
# Headscale: Self-hosted Tailscale control plane
# Manages WireGuard mesh networking: key exchange, DERP relay, ACLs, MagicDNS.
# Runs on dedicated VMs (one per environment for hard network isolation).
# =============================================================================
- name: Configure Headscale Server
  hosts: headscale_servers
  become: yes
  vars:
    headscale_version: "0.28.0"
    # headscale_base_domain: REQUIRED - e.g., ts.example.com (MagicDNS base domain)
    # headscale_domain: REQUIRED - e.g., hs-prod.example.com
    # tls_email: REQUIRED - for Let's Encrypt certificate

  tasks:
    - name: Validate required variables
      fail:
        msg: "{{ item.name }} must be passed via --extra-vars"
      when: item.var is not defined or item.var | length == 0
      loop:
        - { name: "headscale_domain", var: "{{ headscale_domain | default('') }}" }
        - { name: "headscale_base_domain", var: "{{ headscale_base_domain | default('') }}" }
        - { name: "tls_email", var: "{{ tls_email | default('') }}" }

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    # -------------------------------------------------------------------
    # Install Headscale
    # -------------------------------------------------------------------
    - name: Check if Headscale is already installed at target version
      command: headscale version
      register: headscale_current_version
      changed_when: false
      failed_when: false

    - name: Download Headscale .deb package
      get_url:
        url: "https://github.com/juanfont/headscale/releases/download/v{{ headscale_version }}/headscale_{{ headscale_version }}_linux_amd64.deb"
        dest: "/tmp/headscale_{{ headscale_version }}_linux_amd64.deb"
        mode: '0644'
      when: headscale_current_version.rc != 0 or headscale_version not in (headscale_current_version.stdout | default(''))

    - name: Install Headscale .deb package
      apt:
        deb: "/tmp/headscale_{{ headscale_version }}_linux_amd64.deb"
      when: headscale_current_version.rc != 0 or headscale_version not in (headscale_current_version.stdout | default(''))
      notify: restart headscale

    - name: Ensure headscale directories exist
      file:
        path: "{{ item }}"
        state: directory
        owner: headscale
        group: headscale
        mode: '0750'
      loop:
        - /etc/headscale
        - /var/lib/headscale
        - /var/run/headscale

    # -------------------------------------------------------------------
    # TLS certificate for DERP relay (port 443)
    # -------------------------------------------------------------------
    - name: Install Certbot
      apt:
        name: certbot
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Create Certbot renewal-hooks directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /etc/letsencrypt/renewal-hooks/pre
        - /etc/letsencrypt/renewal-hooks/post
        - /etc/letsencrypt/renewal-hooks/deploy

    - name: Deploy Certbot pre-hook (allow port 80 for HTTP-01)
      copy:
        content: |
          #!/bin/bash
          ufw allow 80/tcp comment 'Certbot HTTP-01 temporary'
        dest: /etc/letsencrypt/renewal-hooks/pre/allow-port-80.sh
        mode: '0755'

    - name: Deploy Certbot post-hook (deny port 80 after renewal)
      copy:
        content: |
          #!/bin/bash
          yes | ufw delete allow 80/tcp 2>/dev/null || true
        dest: /etc/letsencrypt/renewal-hooks/post/deny-port-80.sh
        mode: '0755'

    - name: Deploy Certbot deploy-hook (restart Headscale after cert renewal)
      copy:
        content: |
          #!/bin/bash
          # Copy renewed certs to Headscale directory and restart
          cp /etc/letsencrypt/live/{{ headscale_domain }}/fullchain.pem /etc/headscale/tls-cert.pem
          cp /etc/letsencrypt/live/{{ headscale_domain }}/privkey.pem /etc/headscale/tls-key.pem
          chown headscale:headscale /etc/headscale/tls-cert.pem /etc/headscale/tls-key.pem
          chmod 600 /etc/headscale/tls-cert.pem /etc/headscale/tls-key.pem
          systemctl restart headscale
        dest: /etc/letsencrypt/renewal-hooks/deploy/headscale-restart.sh
        mode: '0755'

    - name: Check if Let's Encrypt cert already exists
      stat:
        path: "/etc/letsencrypt/live/{{ headscale_domain }}/fullchain.pem"
      register: hs_cert_file

    - name: Obtain Let's Encrypt certificate for Headscale domain
      block:
        - name: Allow port 80 temporarily for Certbot
          ufw:
            rule: allow
            port: '80'
            proto: tcp
            comment: 'Certbot HTTP-01 temporary'

        - name: Run certbot certonly (standalone)
          command: >
            certbot certonly --standalone --non-interactive --agree-tos
            --email {{ tls_email }}
            -d {{ headscale_domain }}
            --preferred-challenges http
          register: certbot_result
          changed_when: certbot_result.rc == 0 and 'Successfully received certificate' in certbot_result.stdout
          failed_when: certbot_result.rc != 0

        - name: Remove temporary UFW allow 80
          ufw:
            rule: allow
            port: '80'
            proto: tcp
            delete: yes
      when: not hs_cert_file.stat.exists

    - name: Copy TLS certs to Headscale directory
      copy:
        src: "/etc/letsencrypt/live/{{ headscale_domain }}/{{ item.src }}"
        dest: "/etc/headscale/{{ item.dest }}"
        remote_src: yes
        owner: headscale
        group: headscale
        mode: '0600'
      loop:
        - { src: "fullchain.pem", dest: "tls-cert.pem" }
        - { src: "privkey.pem", dest: "tls-key.pem" }
      notify: restart headscale

    # -------------------------------------------------------------------
    # Headscale configuration
    # -------------------------------------------------------------------
    - name: Get server public IP
      uri:
        url: https://ipv4.icanhazip.com/
        return_content: yes
      register: server_public_ip

    - name: Deploy Headscale configuration
      template:
        src: headscale-config.yaml.j2
        dest: /etc/headscale/config.yaml
        owner: headscale
        group: headscale
        mode: '0600'
      notify: restart headscale

    - name: Deploy ACL policy
      template:
        src: headscale-acl-policy.json.j2
        dest: /etc/headscale/acl-policy.json
        owner: headscale
        group: headscale
        mode: '0600'
      notify: restart headscale

    # -------------------------------------------------------------------
    # Systemd and startup
    # -------------------------------------------------------------------
    - name: Deploy Headscale systemd unit
      copy:
        content: |
          [Unit]
          Description=Headscale - Tailscale control server
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=headscale
          Group=headscale
          ExecStart=/usr/local/bin/headscale serve
          Restart=always
          RestartSec=5
          LimitNOFILE=65536

          ProtectSystem=strict
          ProtectHome=true
          ReadWritePaths=/var/lib/headscale /var/run/headscale /etc/headscale
          PrivateTmp=true
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/headscale.service
        mode: '0644'
      notify:
        - reload systemd
        - restart headscale

    - name: Enable and start Headscale
      systemd:
        name: headscale
        enabled: yes
        state: started

    # -------------------------------------------------------------------
    # UFW firewall rules
    # -------------------------------------------------------------------
    - name: Configure UFW rules for Headscale
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        comment: "{{ item.comment }}"
      loop:
        - { port: '443', proto: 'tcp', comment: 'DERP relay' }
        - { port: '3478', proto: 'udp', comment: 'STUN' }
        - { port: '8080', proto: 'tcp', comment: 'Headscale API' }

    # -------------------------------------------------------------------
    # Create users and generate pre-auth keys
    # -------------------------------------------------------------------
    - name: Wait for Headscale to be ready
      command: headscale users list -o json
      register: hs_ready
      retries: 15
      delay: 2
      until: hs_ready.rc == 0
      changed_when: false

    - name: Create Headscale users
      command: "headscale users create {{ item }}"
      loop:
        - infra
        - operators
      register: hs_user_create
      changed_when: "'already exists' not in (hs_user_create.stderr | default(''))"
      failed_when: hs_user_create.rc != 0 and 'already exists' not in (hs_user_create.stderr | default(''))

    - name: Display post-setup instructions
      debug:
        msg: |
          Headscale is running at https://{{ headscale_domain }}:8080

          To generate a pre-auth key for infrastructure nodes:
            ssh root@{{ headscale_domain }} \
              headscale preauthkeys create --user infra --reusable --expiration 87600h --tags tag:k8s-node

          To register an operator (OIDC or CLI):
            headscale users create <username>
            headscale preauthkeys create --user operators --expiration 24h --tags tag:operator

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: restart headscale
      systemd:
        name: headscale
        state: restarted

# =============================================================================
# PostgreSQL: Self-managed database on dedicated VM with Tailscale networking
# Replaces in-cluster Bitnami PostgreSQL. Listens on all interfaces with
# pg_hba.conf restricting to Tailscale CGNAT range. Backups via pgBackRest
# to S3. Monitoring via postgres_exporter over the tailnet.
# =============================================================================
- name: Configure PostgreSQL Server
  hosts: postgres_servers
  become: yes
  vars:
    pg_version: "16"
    pgbackrest_stanza: "main"
    # REQUIRED — must be passed via --extra-vars:
    # pg_shared_buffers, pg_effective_cache_size, pg_max_connections
    # pg_work_mem, pg_maintenance_work_mem
    # pgbackrest_s3_endpoint, pgbackrest_s3_bucket, pgbackrest_s3_region
    # pgbackrest_s3_key, pgbackrest_s3_secret, pgbackrest_cipher_pass
    # postgres_exporter_password
    # headscale_url, tailscale_auth_key
    # pg_databases (list of {name, owner, password} dicts)

  tasks:
    # -------------------------------------------------------------------
    # Validate required variables
    # -------------------------------------------------------------------
    - name: Validate required variables
      fail:
        msg: "{{ item.name }} must be passed via --extra-vars"
      when: item.var is not defined or item.var | length == 0
      loop:
        - { name: "pg_shared_buffers", var: "{{ pg_shared_buffers | default('') }}" }
        - { name: "pg_effective_cache_size", var: "{{ pg_effective_cache_size | default('') }}" }
        - { name: "pgbackrest_s3_bucket", var: "{{ pgbackrest_s3_bucket | default('') }}" }
        - { name: "pgbackrest_s3_region", var: "{{ pgbackrest_s3_region | default('') }}" }
        - { name: "pgbackrest_s3_endpoint", var: "{{ pgbackrest_s3_endpoint | default('') }}" }
        - { name: "pgbackrest_s3_key", var: "{{ pgbackrest_s3_key | default('') }}" }
        - { name: "pgbackrest_s3_secret", var: "{{ pgbackrest_s3_secret | default('') }}" }
        - { name: "pgbackrest_cipher_pass", var: "{{ pgbackrest_cipher_pass | default('') }}" }
        - { name: "postgres_exporter_password", var: "{{ postgres_exporter_password | default('') }}" }

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    # -------------------------------------------------------------------
    # Tailscale client (should already be installed via cloud-init,
    # but ensure it's present and running)
    # -------------------------------------------------------------------
    - name: Check if Tailscale is installed
      command: tailscale version
      register: ts_version
      changed_when: false
      failed_when: false

    - name: Install Tailscale if not present
      shell: curl -fsSL https://tailscale.com/install.sh | sh
      when: ts_version.rc != 0

    - name: Ensure Tailscale is enabled and running
      systemd:
        name: tailscaled
        enabled: yes
        state: started

    - name: Check Tailscale status
      command: tailscale status --json
      register: ts_status
      changed_when: false
      failed_when: false

    - name: Join tailnet if not connected
      command: >
        tailscale up
        --login-server={{ headscale_url }}
        --authkey={{ tailscale_auth_key }}
        --advertise-tags=tag:postgres
        --accept-routes=false
        --ssh
      when: >
        ts_status.rc != 0 or
        (ts_status.stdout | from_json).BackendState != "Running"

    - name: Get Tailscale IP
      command: tailscale ip -4
      register: tailscale_ip
      changed_when: false

    - name: Display Tailscale IP
      debug:
        msg: "PostgreSQL server Tailscale IP: {{ tailscale_ip.stdout }}"

    # -------------------------------------------------------------------
    # PostgreSQL installation (should already be installed via cloud-init)
    # -------------------------------------------------------------------
    - name: Add PostgreSQL APT repository key
      apt_key:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        keyring: /usr/share/keyrings/postgresql-archive-keyring.gpg
        state: present

    - name: Add PostgreSQL APT repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/postgresql-archive-keyring.gpg] http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
        filename: pgdg
        state: present

    - name: Install PostgreSQL and contrib
      apt:
        name:
          - "postgresql-{{ pg_version }}"
          - "postgresql-contrib-{{ pg_version }}"
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    # -------------------------------------------------------------------
    # Ensure data directory is on persistent volume
    # -------------------------------------------------------------------
    - name: Check if data directory exists on volume
      stat:
        path: "/mnt/pgdata/{{ pg_version }}/main/PG_VERSION"
      register: pgdata_on_volume

    - name: Stop PostgreSQL for data migration
      systemd:
        name: postgresql
        state: stopped
      when: not pgdata_on_volume.stat.exists

    - name: Create volume data directory
      file:
        path: "/mnt/pgdata/{{ pg_version }}"
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'
      when: not pgdata_on_volume.stat.exists

    - name: Move data directory to volume
      command: "mv /var/lib/postgresql/{{ pg_version }}/main /mnt/pgdata/{{ pg_version }}/main"
      when: not pgdata_on_volume.stat.exists

    - name: Ensure symlink from default path to volume
      file:
        src: "/mnt/pgdata/{{ pg_version }}/main"
        dest: "/var/lib/postgresql/{{ pg_version }}/main"
        state: link
        owner: postgres
        group: postgres
        force: yes

    # -------------------------------------------------------------------
    # PostgreSQL systemd override: start after Tailscale
    # -------------------------------------------------------------------
    - name: Create PostgreSQL systemd override directory
      file:
        path: /etc/systemd/system/postgresql.service.d
        state: directory
        mode: '0755'

    - name: Deploy PostgreSQL systemd override (after Tailscale)
      copy:
        content: |
          [Unit]
          After=tailscaled.service
          Wants=tailscaled.service
        dest: /etc/systemd/system/postgresql.service.d/after-tailscale.conf
        mode: '0644'
      notify:
        - reload systemd
        - restart postgresql

    # -------------------------------------------------------------------
    # PostgreSQL configuration
    # -------------------------------------------------------------------
    - name: Deploy postgresql.conf
      template:
        src: postgresql.conf.j2
        dest: "/etc/postgresql/{{ pg_version }}/main/postgresql.conf"
        owner: postgres
        group: postgres
        mode: '0644'
      notify: restart postgresql

    - name: Deploy pg_hba.conf
      template:
        src: pg_hba.conf.j2
        dest: "/etc/postgresql/{{ pg_version }}/main/pg_hba.conf"
        owner: postgres
        group: postgres
        mode: '0640'
      notify: reload postgresql

    # -------------------------------------------------------------------
    # Enable and start PostgreSQL
    # -------------------------------------------------------------------
    - name: Enable and start PostgreSQL
      systemd:
        name: postgresql
        enabled: yes
        state: started

    - name: Wait for PostgreSQL to accept connections
      command: "pg_isready -p 5432"
      register: pg_ready
      retries: 15
      delay: 2
      until: pg_ready.rc == 0
      changed_when: false

    # -------------------------------------------------------------------
    # Enable pg_stat_statements extension
    # -------------------------------------------------------------------
    - name: Enable pg_stat_statements extension
      become_user: postgres
      command: psql -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements"
      register: ext_result
      changed_when: "'CREATE EXTENSION' in ext_result.stdout"

    # -------------------------------------------------------------------
    # Database and role initialization
    # -------------------------------------------------------------------
    - name: Create database roles
      become_user: postgres
      command: >
        psql -v ON_ERROR_STOP=1 -c
        "DO $$ BEGIN
          IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ item.owner }}') THEN
            CREATE ROLE \"{{ item.owner }}\" LOGIN PASSWORD '{{ item.password }}';
          ELSE
            ALTER ROLE \"{{ item.owner }}\" WITH PASSWORD '{{ item.password }}';
          END IF;
        END $$;"
      loop: "{{ pg_databases | default([]) }}"
      loop_control:
        label: "{{ item.owner }}"
      no_log: true

    - name: Create databases
      become_user: postgres
      command: >
        psql -v ON_ERROR_STOP=1 -c
        "SELECT 'exists' FROM pg_database WHERE datname = '{{ item.name }}'"
      register: db_check
      loop: "{{ pg_databases | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false

    - name: Create missing databases
      become_user: postgres
      command: >
        psql -v ON_ERROR_STOP=1 -c
        "CREATE DATABASE \"{{ item.item.name }}\" OWNER \"{{ item.item.owner }}\"
        {{ item.item.extra_opts | default('') }}"
      when: "'exists' not in item.stdout"
      loop: "{{ db_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Configure database privileges
      become_user: postgres
      command: >
        psql -v ON_ERROR_STOP=1 -c
        "REVOKE CONNECT ON DATABASE \"{{ item.name }}\" FROM PUBLIC;
         GRANT CONNECT ON DATABASE \"{{ item.name }}\" TO \"{{ item.owner }}\";"
      loop: "{{ pg_databases | default([]) }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Grant schema privileges
      become_user: postgres
      command: >
        psql -v ON_ERROR_STOP=1 -d "{{ item.name }}" -c
        "REVOKE ALL ON SCHEMA public FROM PUBLIC;
         GRANT ALL PRIVILEGES ON SCHEMA public TO \"{{ item.owner }}\";"
      loop: "{{ pg_databases | default([]) }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Create extensions on databases
      become_user: postgres
      command: >
        psql -v ON_ERROR_STOP=1 -d "{{ item.0.name }}" -c
        "CREATE EXTENSION IF NOT EXISTS {{ item.1 }}"
      loop: "{{ pg_databases | default([]) | subelements('extensions', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }}: {{ item.1 }}"
      register: ext_result
      changed_when: "'CREATE EXTENSION' in ext_result.stdout"

    # -------------------------------------------------------------------
    # postgres_exporter for Prometheus monitoring
    # -------------------------------------------------------------------
    - name: Create postgres_exporter monitoring role
      become_user: postgres
      command: >
        psql -v ON_ERROR_STOP=1 -c
        "DO $$ BEGIN
          IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'postgres_exporter') THEN
            CREATE ROLE postgres_exporter LOGIN PASSWORD '{{ postgres_exporter_password }}';
          ELSE
            ALTER ROLE postgres_exporter WITH PASSWORD '{{ postgres_exporter_password }}';
          END IF;
        END $$;"
      no_log: true

    - name: Grant monitoring permissions to postgres_exporter
      become_user: postgres
      command: >
        psql -v ON_ERROR_STOP=1 -c
        "GRANT pg_monitor TO postgres_exporter;"
      register: grant_result
      changed_when: false

    - name: Deploy postgres_exporter systemd unit
      template:
        src: postgres-exporter.service.j2
        dest: /etc/systemd/system/postgres_exporter.service
        mode: '0644'
      notify:
        - reload systemd
        - restart postgres_exporter

    - name: Enable and start postgres_exporter
      systemd:
        name: postgres_exporter
        enabled: yes
        state: started

    # -------------------------------------------------------------------
    # pgBackRest backup configuration
    # -------------------------------------------------------------------
    - name: Install pgBackRest
      apt:
        name: pgbackrest
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Ensure pgBackRest directories exist
      file:
        path: "{{ item }}"
        state: directory
        owner: postgres
        group: postgres
        mode: '0750'
      loop:
        - /var/log/pgbackrest
        - /var/lib/pgbackrest
        - /etc/pgbackrest

    - name: Deploy pgBackRest configuration
      template:
        src: pgbackrest.conf.j2
        dest: /etc/pgbackrest/pgbackrest.conf
        owner: postgres
        group: postgres
        mode: '0600'

    - name: Create pgBackRest stanza
      become_user: postgres
      command: "pgbackrest --stanza={{ pgbackrest_stanza }} stanza-create"
      register: stanza_create
      changed_when: "'already exists' not in (stanza_create.stderr | default(''))"
      failed_when: stanza_create.rc != 0 and 'already exists' not in (stanza_create.stderr | default(''))

    - name: Verify pgBackRest stanza
      become_user: postgres
      command: "pgbackrest --stanza={{ pgbackrest_stanza }} check"
      changed_when: false

    # -------------------------------------------------------------------
    # pgBackRest scheduled backups via systemd timers
    # -------------------------------------------------------------------
    - name: Deploy pgBackRest full backup service
      copy:
        content: |
          [Unit]
          Description=pgBackRest Full Backup

          [Service]
          Type=oneshot
          User=postgres
          Group=postgres
          ExecStart=/usr/bin/pgbackrest --stanza={{ pgbackrest_stanza }} --type=full backup
          IOSchedulingClass=idle
          Nice=19
        dest: /etc/systemd/system/pgbackrest-full.service
        mode: '0644'
      notify: reload systemd

    - name: Deploy pgBackRest full backup timer (weekly)
      copy:
        content: |
          [Unit]
          Description=pgBackRest Full Backup - Weekly

          [Timer]
          OnCalendar=Sun *-*-* 02:00:00
          Persistent=true
          RandomizedDelaySec=600

          [Install]
          WantedBy=timers.target
        dest: /etc/systemd/system/pgbackrest-full.timer
        mode: '0644'
      notify: reload systemd

    - name: Deploy pgBackRest differential backup service
      copy:
        content: |
          [Unit]
          Description=pgBackRest Differential Backup

          [Service]
          Type=oneshot
          User=postgres
          Group=postgres
          ExecStart=/usr/bin/pgbackrest --stanza={{ pgbackrest_stanza }} --type=diff backup
          IOSchedulingClass=idle
          Nice=19
        dest: /etc/systemd/system/pgbackrest-diff.service
        mode: '0644'
      notify: reload systemd

    - name: Deploy pgBackRest differential backup timer (daily)
      copy:
        content: |
          [Unit]
          Description=pgBackRest Differential Backup - Daily

          [Timer]
          OnCalendar=Mon..Sat *-*-* 02:00:00
          Persistent=true
          RandomizedDelaySec=600

          [Install]
          WantedBy=timers.target
        dest: /etc/systemd/system/pgbackrest-diff.timer
        mode: '0644'
      notify: reload systemd

    - name: Enable pgBackRest backup timers
      systemd:
        name: "{{ item }}"
        enabled: yes
        state: started
      loop:
        - pgbackrest-full.timer
        - pgbackrest-diff.timer

    # -------------------------------------------------------------------
    # UFW firewall rules
    # -------------------------------------------------------------------
    - name: Configure UFW rules for PostgreSQL server
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        comment: "{{ item.comment }}"
      loop:
        - { port: '41641', proto: 'udp', comment: 'Tailscale WireGuard' }

    # -------------------------------------------------------------------
    # Run initial full backup
    # -------------------------------------------------------------------
    - name: Check if any backup exists
      become_user: postgres
      command: "pgbackrest --stanza={{ pgbackrest_stanza }} info --output=json"
      register: backup_info
      changed_when: false
      failed_when: false

    - name: Run initial full backup if none exists
      become_user: postgres
      command: "pgbackrest --stanza={{ pgbackrest_stanza }} --type=full backup"
      when: backup_info.rc != 0 or (backup_info.stdout | from_json)[0].backup | default([]) | length == 0
      async: 3600
      poll: 30

    - name: Display post-setup instructions
      debug:
        msg: |
          PostgreSQL {{ pg_version }} is running on {{ tailscale_ip.stdout }}:5432

          Tailscale IP: {{ tailscale_ip.stdout }}
          Data directory: /mnt/pgdata/{{ pg_version }}/main (persistent volume)
          Backups: pgBackRest to S3 ({{ pgbackrest_s3_bucket }})
            Full: weekly (Sundays 02:00)
            Differential: daily (Mon-Sat 02:00)
          Monitoring: postgres_exporter on {{ tailscale_ip.stdout }}:9187

          Connect from PgBouncer or operator:
            psql -h {{ tailscale_ip.stdout }} -U <role> -d <database>

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: restart postgresql
      systemd:
        name: postgresql
        state: restarted

    - name: reload postgresql
      become_user: postgres
      command: "pg_ctlcluster {{ pg_version }} main reload"

    - name: restart postgres_exporter
      systemd:
        name: postgres_exporter
        state: restarted
