apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-dashboard
  namespace: infra-monitoring
  labels:
    grafana_dashboard: "1"
data:
  postgresql-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0 }
                ]
              },
              "mappings": [
                { "options": { "0": { "text": "DOWN" }, "1": { "text": "UP" } }, "type": "value" }
              ],
              "color": { "mode": "thresholds" }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 1,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "auto", "textMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "Status",
          "type": "stat",
          "targets": [
            {
              "expr": "pg_up{namespace=\"infra-db\"}",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 80 }, { "color": "red", "value": 95 }] }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "id": 2,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "textMode": "value_and_name", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "Active Connections",
          "type": "stat",
          "targets": [
            {
              "expr": "sum by (pod) (pg_stat_activity_count{namespace=\"infra-db\", state=\"active\"})",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 80 }, { "color": "red", "value": 95 }] }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "id": 3,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "textMode": "value_and_name", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "Total Connections",
          "type": "stat",
          "targets": [
            {
              "expr": "sum by (pod) (pg_stat_activity_count{namespace=\"infra-db\"})",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0, "max": 1,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 0.9 }, { "color": "green", "value": 0.99 }] }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "id": 4,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "textMode": "value_and_name", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "Cache Hit Ratio",
          "type": "stat",
          "targets": [
            {
              "expr": "pg_stat_database_blks_hit{namespace=\"infra-db\", datname!~\"template.*|postgres\"} / (pg_stat_database_blks_hit{namespace=\"infra-db\", datname!~\"template.*|postgres\"} + pg_stat_database_blks_read{namespace=\"infra-db\", datname!~\"template.*|postgres\"} + 1)",
              "legendFormat": "{{datname}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 5368709120 }, { "color": "red", "value": 8589934592 }] }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "id": 5,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "textMode": "value_and_name", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "Database Size",
          "type": "stat",
          "targets": [
            {
              "expr": "pg_database_size_bytes{namespace=\"infra-db\", datname!~\"template.*|postgres\"}",
              "legendFormat": "{{datname}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 671088640 }, { "color": "red", "value": 939524096 }] }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "id": 6,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "textMode": "value_and_name", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "Memory Usage",
          "type": "stat",
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"infra-db\", container=\"postgresql\"}",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 101,
          "title": "Connections & Activity",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 1, "fillOpacity": 20, "stacking": { "mode": "normal" } } } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "id": 10,
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "calcs": ["lastNotNull", "max"] } },
          "title": "Connections by State",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (state) (pg_stat_activity_count{namespace=\"infra-db\"})",
              "legendFormat": "{{state}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "ops", "custom": { "lineWidth": 1, "fillOpacity": 10 } } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "id": 11,
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "calcs": ["mean", "max"] } },
          "title": "Transactions / sec",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(pg_stat_database_xact_commit{namespace=\"infra-db\", datname!~\"template.*|postgres\"}[5m])",
              "legendFormat": "{{datname}} commits"
            },
            {
              "expr": "rate(pg_stat_database_xact_rollback{namespace=\"infra-db\", datname!~\"template.*|postgres\"}[5m])",
              "legendFormat": "{{datname}} rollbacks"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 102,
          "title": "Performance",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "custom": { "lineWidth": 1, "fillOpacity": 10 } } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "id": 20,
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "calcs": ["mean", "min"] } },
          "title": "Cache Hit Ratio Over Time",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(pg_stat_database_blks_hit{namespace=\"infra-db\", datname!~\"template.*|postgres\"}[5m]) / (rate(pg_stat_database_blks_hit{namespace=\"infra-db\", datname!~\"template.*|postgres\"}[5m]) + rate(pg_stat_database_blks_read{namespace=\"infra-db\", datname!~\"template.*|postgres\"}[5m]) + 1)",
              "legendFormat": "{{datname}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 1, "fillOpacity": 10 } } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "id": 21,
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "calcs": ["mean", "max"] } },
          "title": "Rows Returned / Fetched per sec",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(pg_stat_database_tup_returned{namespace=\"infra-db\", datname!~\"template.*|postgres\"}[5m])",
              "legendFormat": "{{datname}} returned"
            },
            {
              "expr": "rate(pg_stat_database_tup_fetched{namespace=\"infra-db\", datname!~\"template.*|postgres\"}[5m])",
              "legendFormat": "{{datname}} fetched"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "id": 103,
          "title": "Writes & WAL",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "ops", "custom": { "lineWidth": 1, "fillOpacity": 10, "stacking": { "mode": "normal" } } } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "id": 30,
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "calcs": ["mean", "max"] } },
          "title": "Row Writes / sec",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(pg_stat_database_tup_inserted{namespace=\"infra-db\", datname!~\"template.*|postgres\"}[5m])",
              "legendFormat": "{{datname}} inserts"
            },
            {
              "expr": "rate(pg_stat_database_tup_updated{namespace=\"infra-db\", datname!~\"template.*|postgres\"}[5m])",
              "legendFormat": "{{datname}} updates"
            },
            {
              "expr": "rate(pg_stat_database_tup_deleted{namespace=\"infra-db\", datname!~\"template.*|postgres\"}[5m])",
              "legendFormat": "{{datname}} deletes"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 1, "fillOpacity": 10 } } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "id": 31,
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "calcs": ["mean", "max"] } },
          "title": "Temp Files & Deadlocks",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(pg_stat_database_temp_files{namespace=\"infra-db\", datname!~\"template.*|postgres\"}[5m])",
              "legendFormat": "{{datname}} temp files"
            },
            {
              "expr": "rate(pg_stat_database_deadlocks{namespace=\"infra-db\", datname!~\"template.*|postgres\"}[5m])",
              "legendFormat": "{{datname}} deadlocks"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 32 },
          "id": 104,
          "title": "Resources",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "bytes", "custom": { "lineWidth": 1, "fillOpacity": 20 } } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 33 },
          "id": 40,
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "calcs": ["lastNotNull"] } },
          "title": "Memory Usage",
          "type": "timeseries",
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"infra-db\", container=\"postgresql\"}",
              "legendFormat": "{{pod}} working set"
            },
            {
              "expr": "kube_pod_container_resource_limits{namespace=\"infra-db\", container=\"postgresql\", resource=\"memory\"}",
              "legendFormat": "{{pod}} limit"
            },
            {
              "expr": "kube_pod_container_resource_requests{namespace=\"infra-db\", container=\"postgresql\", resource=\"memory\"}",
              "legendFormat": "{{pod}} request"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 1, "fillOpacity": 20 } } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 33 },
          "id": 41,
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "calcs": ["mean", "max"] } },
          "title": "CPU Usage (millicores)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"infra-db\", container=\"postgresql\"}[5m]) * 1000",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "bytes", "custom": { "lineWidth": 1, "fillOpacity": 20 } } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 41 },
          "id": 42,
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "calcs": ["lastNotNull"] } },
          "title": "Database Sizes",
          "type": "timeseries",
          "targets": [
            {
              "expr": "pg_database_size_bytes{namespace=\"infra-db\", datname!~\"template.*|postgres\"}",
              "legendFormat": "{{datname}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "ops", "custom": { "lineWidth": 1, "fillOpacity": 10 } } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 41 },
          "id": 43,
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "calcs": ["mean", "max"] } },
          "title": "Disk IOPS",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(container_fs_reads_total{namespace=\"infra-db\", container=\"postgresql\"}[5m])",
              "legendFormat": "{{pod}} reads"
            },
            {
              "expr": "rate(container_fs_writes_total{namespace=\"infra-db\", container=\"postgresql\"}[5m])",
              "legendFormat": "{{pod}} writes"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["postgresql", "database", "infra"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "PostgreSQL - Shared (infra-db)",
      "uid": "postgresql-infra-db",
      "version": 1
    }
