# Redis for Nextcloud file locking and distributed caching
# Deployed to the tenant files namespace (tn-<tenant>-files)
#
# Without Redis, Nextcloud uses the PostgreSQL database for:
#   - File locking (oc_file_locks table)
#   - Distributed cache
#   - Transactional file locking
# This causes significant unnecessary DB load.
#
# With Redis, Nextcloud uses:
#   - memcache.distributed = \OC\Memcache\Redis
#   - memcache.locking = \OC\Memcache\Redis
#
# The Nextcloud Helm chart configures config.php automatically
# when externalRedis is enabled (via REDIS_HOST env vars).
#
# Required: Secret 'nextcloud-redis' with key 'redis-password'
# (created by deploy-nextcloud.sh)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
    component: nextcloud-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        component: nextcloud-cache
    spec:
      containers:
        - name: redis
          image: redis:8-alpine
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)", "--maxmemory", "1536mb", "--maxmemory-policy", "allkeys-lru"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-redis
                  key: redis-password
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a $REDIS_PASSWORD ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a $REDIS_PASSWORD ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: redis
    component: nextcloud-cache
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  type: ClusterIP
