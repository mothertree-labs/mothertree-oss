installCRDs: true
replicaCount: 1
# Memory tuned based on actual usage (~43Mi observed)
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

# Cainjector resources
cainjector:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

# Enable ServiceMonitor for Prometheus metrics (cert expiry alerts)
prometheus:
  servicemonitor:
    enabled: true

# Webhook resources
webhook:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      memory: 64Mi
