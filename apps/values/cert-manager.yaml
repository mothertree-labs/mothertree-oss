installCRDs: true
replicaCount: 1
# Memory tuned based on actual usage (~43Mi observed)
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

# Cainjector resources
cainjector:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

# Enable ServiceMonitor for Prometheus metrics (cert expiry alerts).
# kube-prometheus-stack's Prometheus selects ServiceMonitors with
# `release: kube-prometheus-stack`. Without this label cert-manager's metrics
# are silently never scraped — and the `CertificateExpiringSoon` /
# `CertificateNotReady` alerts never fire because their input metrics don't exist.
prometheus:
  servicemonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack

# Webhook resources
webhook:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      memory: 64Mi
