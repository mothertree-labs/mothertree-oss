replicaCount: 1

autoscaling:
  enabled: false

collabora:
  extra_params: --o:ssl.enable=false --o:ssl.termination=true --o:logging.level=information

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 2Gi

probes:
  startup:
    enabled: true
    failureThreshold: 30
    periodSeconds: 3
  readiness:
    enabled: true
  liveness:
    enabled: true
