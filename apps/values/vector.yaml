# Vector Configuration for Log Collection
# Minimal configuration using chart defaults

# Vector role - Agent for log collection
role: Agent

# Resource limits — top-level key for vector/vector chart
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi

# Agent configuration
agent:
  # DaemonSet configuration
  daemonSet:
    enabled: true

# Use dataDir to specify a different data directory
dataDir: /tmp/vector-data

# Use customConfig with minimal overrides
customConfig:
  data_dir: /tmp/vector-data
  api:
    enabled: true
    address: 127.0.0.1:8686
    playground: false
  sources:
    kubernetes_logs:
      type: kubernetes_logs
    host_metrics:
      filesystem:
        devices:
          excludes: [binfmt_misc]
        filesystems:
          excludes: [binfmt_misc]
        mountpoints:
          excludes: ["*/proc/sys/fs/binfmt_misc"]
      type: host_metrics
    internal_metrics:
      type: internal_metrics

  transforms:
    kubernetes_metadata:
      type: remap
      inputs: [kubernetes_logs]
      source: |
        # Extract Kubernetes metadata from the log event
        .namespace = .kubernetes.pod_namespace
        .pod_name = .kubernetes.pod_name
        .container_name = .kubernetes.container_name
        .node_name = .kubernetes.pod_node_name

        # Extract common Kubernetes labels if they exist
        .app = .kubernetes.pod_labels.app
        .component = .kubernetes.pod_labels.component

        # Extract stream (stdout/stderr) and container image
        .stream = .stream
        .image = .kubernetes.container_image

        # Drop the bulky kubernetes metadata blob and other noise
        # (useful fields already extracted above as labels)
        del(.kubernetes)
        del(.file)
        del(.source_type)

        # Classify by tier based on namespace prefix
        if starts_with(string!(.namespace), "infra-") {
          .tier = "infra"
        } else if starts_with(string!(.namespace), "tn-") {
          .tier = "tenant"
        } else {
          .tier = "system"
        }

        # Try JSON parsing of log message for structured logs
        msg_str = string(.message) ?? ""
        parsed, err = parse_json(msg_str)
        if err == null {
          # Extract level from JSON (try common field names)
          .level = downcase(string(parsed.level) ?? string(parsed.lvl) ?? string(parsed.severity) ?? "")
          # Extract clean message from JSON
          json_msg = string(parsed.msg) ?? string(parsed.message) ?? ""
          if json_msg != "" {
            .msg = json_msg
          }
        }

        # If level not set from JSON, extract from text patterns
        if .level == null || .level == "" {
          if match(msg_str, r'(?i)\bERROR\b') {
            .level = "error"
          } else if match(msg_str, r'(?i)\bWARN(ING)?\b') {
            .level = "warn"
          } else if match(msg_str, r'(?i)\bINFO\b') {
            .level = "info"
          } else if match(msg_str, r'(?i)\bDEBUG\b') {
            .level = "debug"
          } else {
            .level = "unknown"
          }
        }

  sinks:
    # Loki sink for centralized logging
    loki:
      type: loki
      inputs: [kubernetes_metadata]
      endpoint: "http://loki.infra-monitoring.svc.cluster.local:3100"
      labels:
        job: "kubernetes-pods"
        namespace: "{{ `{{ namespace }}` }}"
        pod_name: "{{ `{{ pod_name }}` }}"
        container_name: "{{ `{{ container_name }}` }}"
        node_name: "{{ `{{ node_name }}` }}"
        app: "{{ `{{ app }}` }}"
        tier: "{{ `{{ tier }}` }}"
        level: "{{ `{{ level }}` }}"
        stream: "{{ `{{ stream }}` }}"
      encoding:
        codec: json
      remove_label_fields: true
    prom_exporter:
      type: prometheus_exporter
      inputs: [host_metrics, internal_metrics]
      address: 0.0.0.0:9090

# Service account
serviceAccount:
  create: true
  name: vector
