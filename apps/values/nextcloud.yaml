# Nextcloud Configuration
# Conservative resource allocation for 2-node cluster
# Uses shared PostgreSQL database (docs-postgresql)

# Use the chart's built-in HPA. This omits .spec.replicas from the Deployment
# template entirely, avoiding Helm 4 SSA conflicts with kube-controller-manager
# which owns .spec.replicas via the HPA scale subresource.
hpa:
  enabled: true
  cputhreshold: 80
  minPods: 1
  maxPods: 3

# Disable internal SQLite database
internalDatabase:
  enabled: false

# External database configuration (shared PostgreSQL in 'infra-db' namespace)
# Note: A dedicated secret 'nextcloud-db' will be created by deploy-nextcloud.sh
# IMPORTANT: The password is sourced from docs-secrets.DATABASE_PASSWORD (the authoritative source)
# User and database are per-tenant (e.g., docs_example, nextcloud_example)
externalDatabase:
  enabled: true
  type: postgresql
  # host is set in environment-specific files (apps/environments/<env>/nextcloud.yaml.gotmpl)
  # to support both standalone (docs-postgresql) and replication (docs-postgresql-primary) architectures
  host: docs-postgresql.infra-db.svc.cluster.local  # default, overridden per environment
  user: ""  # Set per-tenant in environment values (e.g., docs_example)
  password: ""
  database: ""  # Set per-tenant in environment values (e.g., nextcloud_example)
  existingSecret:
    enabled: true
    secretName: nextcloud-db
    usernameKey: db-username
    passwordKey: db-password

# Resource limits
resources:
  requests:
    cpu: 500m
    memory: 192Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# No PVC — use chart-default emptyDir for /var/www/html
# Identity values (instanceid, passwordsalt, secret) are persisted in a K8s Secret
# and seeded by the seed-identity init container on every pod start.
# Actual file data lives in S3; everything on disk is ephemeral.
persistence:
  enabled: false

# Deployment strategy: RollingUpdate for zero-downtime deploys
# (Only possible because we no longer use a ReadWriteOnce PVC)
nextcloud:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  host: ""  # Set in environment-specific files
  username: admin
  password: ""  # Will be auto-generated by Helm chart
  # Regenerate .htaccess on every pod start (writes front-controller rewrite rules).
  # Requires overwrite.cli.url to be set (done in environment-specific values).
  extraEnv:
    - name: NEXTCLOUD_INIT_HTACCESS
      value: "true"
  # Custom config.php settings
  configs:
    # Disable default skeleton files for new users (empty filesystem)
    skeleton.config.php: |-
      <?php
      $CONFIG = array (
        'skeletondirectory' => '',
      );
    # Allow connections to local/private IPs (required for OIDC and Collabora).
    # Nextcloud's DnsPinMiddleware uses dns_get_record() which bypasses /etc/hosts,
    # then pins the resolved IP via CURLOPT_RESOLVE. Without this setting, the
    # hostAliases (which route auth/office hostnames to the internal ingress) are
    # ignored and requests hit the external ingress (PROXY protocol → ECONNRESET).
    # With allow_local_remote_servers=true, the DNS pinning middleware is bypassed,
    # cURL uses normal resolution (respects /etc/hosts), and hostAliases work.
    allow-local.config.php: |-
      <?php
      $CONFIG = array (
        'allow_local_remote_servers' => true,
      );

  # PHP ini overrides (mounted into /usr/local/etc/php/conf.d/)
  # Session cookie security — critical for OIDC login.
  # Without cookie_secure, the PHP session cookie is not flagged Secure and gets
  # dropped during the cross-origin redirect from Keycloak back to Nextcloud,
  # causing "state does not match" errors in the OIDC authorization code flow.
  phpConfigs:
    session-security.ini: |-
      session.cookie_secure = 1
      session.cookie_httponly = 1
      session.cookie_samesite = Lax

  # Init containers:
  #   1. install-pandoc: downloads Pandoc binary for DOCX conversion
  #   2. seed-identity: populates emptyDir with Nextcloud files + identity from K8s Secret
  extraInitContainers:
    - name: install-pandoc
      image: alpine:3.20
      command:
        - sh
        - -c
        - |
          wget -qO- https://github.com/jgm/pandoc/releases/download/3.6/pandoc-3.6-linux-amd64.tar.gz \
            | tar xz --strip-components=2 -C /pandoc-bin pandoc-3.6/bin/pandoc
      volumeMounts:
        - name: pandoc-bin
          mountPath: /pandoc-bin
    - name: seed-identity
      # IMPORTANT: Must match the Nextcloud image used by the chart (chart 8.9.0 = 32.0.5-apache).
      # Update this when upgrading the Helm chart version.
      image: nextcloud:32.0.5-apache
      command: ["/bin/sh", "/scripts/identity-init.sh"]
      env:
        - name: NC_INSTANCE_ID
          valueFrom:
            secretKeyRef:
              name: nextcloud-identity
              key: instanceid
              optional: true
        - name: NC_PASSWORD_SALT
          valueFrom:
            secretKeyRef:
              name: nextcloud-identity
              key: passwordsalt
              optional: true
        - name: NC_SECRET
          valueFrom:
            secretKeyRef:
              name: nextcloud-identity
              key: secret
              optional: true
        - name: NC_VERSION
          valueFrom:
            secretKeyRef:
              name: nextcloud-identity
              key: version
              optional: true
        # Database connection — needed so config.php includes DB settings
        # (the Nextcloud entrypoint only writes these during initial install)
        - name: NC_DB_HOST
          valueFrom:
            secretKeyRef:
              name: nextcloud-db
              key: db-hostname
              optional: true
        - name: NC_DB_USER
          valueFrom:
            secretKeyRef:
              name: nextcloud-db
              key: db-username
              optional: true
        - name: NC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-db
              key: db-password
              optional: true
        - name: NC_DB_NAME
          valueFrom:
            secretKeyRef:
              name: nextcloud-db
              key: db-database
              optional: true
        - name: NC_TRUSTED_DOMAINS
          valueFrom:
            secretKeyRef:
              name: nextcloud-identity
              key: trusted-domains
              optional: true
      volumeMounts:
        - name: nextcloud-main
          mountPath: /mnt/html
          subPath: html
        - name: nextcloud-main
          mountPath: /mnt/config
          subPath: config
        - name: nextcloud-main
          mountPath: /mnt/custom_apps
          subPath: custom_apps
        - name: nextcloud-main
          mountPath: /mnt/data
          subPath: data
        - name: identity-init-script
          mountPath: /scripts
        - name: custom-apps-archive
          mountPath: /custom-apps-archive
        - name: appstore-urls
          mountPath: /appstore-urls

  # Extra volumes for init containers and pandoc
  extraVolumes:
    - name: pandoc-bin
      emptyDir: {}
    - name: identity-init-script
      configMap:
        name: nextcloud-identity-init
        defaultMode: 0755
    - name: custom-apps-archive
      configMap:
        name: nextcloud-custom-apps
        optional: true
    - name: appstore-urls
      configMap:
        name: nextcloud-appstore-urls
        optional: true
    - name: before-starting-hook
      configMap:
        name: nextcloud-before-starting
        defaultMode: 0755
        optional: true

  # Mount pandoc binary in Nextcloud container
  extraVolumeMounts:
    - name: pandoc-bin
      mountPath: /usr/local/bin/pandoc
      subPath: pandoc
    - name: before-starting-hook
      mountPath: /docker-entrypoint-hooks.d/before-starting

# Ingress will be configured in environment-specific files
ingress:
  enabled: false

# OIDC configuration is done via the nextcloud-oidc-config-job after deployment
# This ensures Nextcloud is fully installed before configuring OIDC

# PHP configuration for HTTPS behind proxy
phpClientHttpsFix:
  enabled: true
  protocol: https

# External Redis for distributed caching and file locking
# Deployed as a simple pod in the same namespace by deploy-nextcloud.sh
# Secret 'nextcloud-redis' is created by the deploy script
externalRedis:
  enabled: true
  host: redis
  port: "6379"
  existingSecret:
    enabled: true
    secretName: nextcloud-redis
    passwordKey: redis-password

# Disable built-in Redis subchart (we deploy our own lightweight instance)
redis:
  enabled: false

# Background jobs via cron sidecar (runs /cron.php every 5 minutes)
# Without this, Nextcloud uses AJAX mode which only triggers background
# jobs on page loads, causing job storms when users visit after idle periods
cronjob:
  enabled: true
  type: sidecar
  sidecar:
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 1000m
        memory: 512Mi

# Disable built-in MariaDB (we use PostgreSQL)
mariadb:
  enabled: false

# Disable built-in PostgreSQL subchart (we use the shared docs-postgresql)
postgresql:
  enabled: false
