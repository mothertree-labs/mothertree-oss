depends_on:
  - e2e-setup

when:
  - event: pull_request
  - event: push
    branch: main

clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      recursive: false

steps:
  - name: e2e-tests
    image: bash
    environment:
      E2E_SHARD: "2/10"
      E2E_BASE_DOMAIN:
        from_secret: e2e_base_domain
      E2E_TENANT:
        from_secret: e2e_tenant
      E2E_ECHO_GROUP_ADDRESS:
        from_secret: e2e_echo_group_address
      CI: "true"
    commands:
      - ci/scripts/e2e-playwright.sh
