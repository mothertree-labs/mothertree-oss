depends_on:
  - e2e-setup
  - ci-lease

when:
  - event: pull_request
  - event: push
    branch: main

clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      recursive: false

steps:
  - name: e2e-tests
    image: bash
    environment:
      E2E_SHARD: "3/10"
      CI: "true"
      # Per-tenant secrets — ci-resolve-tenant.sh maps the right ones
      E2E_MOTHERTREE_BASE_DOMAIN:
        from_secret: e2e_mothertree_base_domain
      E2E_MOTHERTREE_STALWART_ADMIN_PASSWORD:
        from_secret: e2e_mothertree_stalwart_admin_password
      E2E_MOTHERTREE_STALWART_IMAP_HOST:
        from_secret: e2e_mothertree_stalwart_imap_host
      E2E_MOTHERTREE_STALWART_IMAP_PORT:
        from_secret: e2e_mothertree_stalwart_imap_port
      E2E_MOTHERTREE_ECHO_GROUP_ADDRESS:
        from_secret: e2e_mothertree_echo_group_address
      E2E_INNBA_BASE_DOMAIN:
        from_secret: e2e_innba_base_domain
      E2E_INNBA_STALWART_ADMIN_PASSWORD:
        from_secret: e2e_innba_stalwart_admin_password
      E2E_INNBA_STALWART_IMAP_HOST:
        from_secret: e2e_innba_stalwart_imap_host
      E2E_INNBA_STALWART_IMAP_PORT:
        from_secret: e2e_innba_stalwart_imap_port
      E2E_INNBA_ECHO_GROUP_ADDRESS:
        from_secret: e2e_innba_echo_group_address
    commands:
      - ci/scripts/e2e-playwright.sh
      - ci/scripts/ci-renew-lease.sh
