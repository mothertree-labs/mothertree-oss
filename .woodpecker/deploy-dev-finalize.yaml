when:
  - event: pull_request
  - event: push
    branch: main

depends_on:
  - deploy-dev-matrix
  - deploy-dev-nextcloud
  - deploy-dev-jitsi
  - deploy-dev-stalwart
  - deploy-dev-roundcube
  - deploy-dev-calendar
  - deploy-dev-email-probe
  - deploy-dev-portals

clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      recursive: false

steps:
  - name: deploy-dev-finalize
    image: bash
    when:
      - event: pull_request
    environment:
      CI: "true"
      CI_VALKEY_PASSWORD:
        from_secret: ci_valkey_password
      DEPLOY_VAULT_PASSWORD:
        from_secret: deploy_vault_password
      GITHUB_PAT:
        from_secret: github_pat
      LINODE_CLI_TOKEN:
        from_secret: linode_token
      E2E_POOL1_TENANT:
        from_secret: e2e_pool1_tenant
      E2E_POOL2_TENANT:
        from_secret: e2e_pool2_tenant
      E2E_POOL1_BASE_DOMAIN:
        from_secret: e2e_pool1_base_domain
      E2E_POOL2_BASE_DOMAIN:
        from_secret: e2e_pool2_base_domain
    commands:
      - ci/scripts/ci-deploy-app.sh dev finalize

  # Pipeline-scoped test users for E2E. Lives here so it runs AFTER the
  # tenant auth ingress is up (created in apps/deploy-matrix.sh, which
  # this workflow depends on). The step itself runs on both PR and push
  # so users are provisioned for every pipeline; on main push the
  # deploy-dev-finalize step above is a no-op but this one still runs.
  - name: create-test-users
    image: bash
    environment:
      CI: "true"
      CI_VALKEY_PASSWORD:
        from_secret: ci_valkey_password
      # Required by the in-cluster Keycloak OIDC pre-check (cold-start gap #15).
      # Used to fetch a live dev kubeconfig from the Linode API so we can probe
      # Keycloak via the kubectl API-server proxy independently of public ingress.
      LINODE_CLI_TOKEN:
        from_secret: linode_token
      E2E_POOL1_TENANT:
        from_secret: e2e_pool1_tenant
      E2E_POOL1_BASE_DOMAIN:
        from_secret: e2e_pool1_base_domain
      E2E_POOL1_KC_REALM:
        from_secret: e2e_pool1_kc_realm
      E2E_POOL1_KC_CLIENT_SECRET:
        from_secret: e2e_pool1_kc_client_secret
      E2E_POOL2_TENANT:
        from_secret: e2e_pool2_tenant
      E2E_POOL2_BASE_DOMAIN:
        from_secret: e2e_pool2_base_domain
      E2E_POOL2_KC_REALM:
        from_secret: e2e_pool2_kc_realm
      E2E_POOL2_KC_CLIENT_SECRET:
        from_secret: e2e_pool2_kc_client_secret
    commands:
      - ci/scripts/ci-create-test-users.sh

  # Cold-start gap #17: re-mint CalDAV tokens AFTER create-test-users.
  #
  # apps/deploy-calendar-automation.sh mints per-user CalDAV app-passwords at
  # calendar-automation deploy time (deploy-dev-calendar workflow), enumerating
  # only the users that exist then. The fixed mail user `e2e-mailrt` is created
  # later, by the create-test-users step above (it lives here, not in
  # deploy-dev-prep, to fix pipeline #1258's OIDC-404). calendar-automation
  # reads the token Secret only once at startup, so without a re-mint + restart
  # the 3 calendar-external-invite e2e tests (shard-4) time out waiting for
  # CalDAV events. This step re-mints now that e2e-mailrt exists, rollout-
  # restarts calendar-automation so it reloads the Secret, and hard-asserts the
  # e2e-mailrt token is present (fail loudly, never silently skip).
  #
  # Runs only on pull_request: on main push there is no leased dev tenant.
  # Deferred prod ordering gap tracked in GitHub issue #412.
  - name: remint-caldav-tokens
    image: bash
    when:
      - event: pull_request
    environment:
      CI: "true"
      CI_VALKEY_PASSWORD:
        from_secret: ci_valkey_password
      DEPLOY_VAULT_PASSWORD:
        from_secret: deploy_vault_password
      GITHUB_PAT:
        from_secret: github_pat
      LINODE_CLI_TOKEN:
        from_secret: linode_token
      E2E_POOL1_TENANT:
        from_secret: e2e_pool1_tenant
      E2E_POOL2_TENANT:
        from_secret: e2e_pool2_tenant
      E2E_POOL1_BASE_DOMAIN:
        from_secret: e2e_pool1_base_domain
      E2E_POOL2_BASE_DOMAIN:
        from_secret: e2e_pool2_base_domain
    commands:
      - ci/scripts/ci-deploy-app.sh dev remint-caldav-tokens
