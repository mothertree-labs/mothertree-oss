depends_on:
  - e2e-shard-1
  - e2e-shard-2
  - e2e-shard-3
  - e2e-shard-4
  - e2e-shard-5
  - e2e-shard-6
  - e2e-shard-7
  - e2e-shard-8
  - e2e-shard-9
  - e2e-shard-10

runs_on: [ success, failure ]

when:
  - event: pull_request
  - event: push
    branch: main

clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      recursive: false

steps:
  - name: release-tenant
    image: bash
    environment:
      CI: "true"
      E2E_MOTHERTREE_BASE_DOMAIN:
        from_secret: e2e_mothertree_base_domain
      E2E_MOTHERTREE_KC_REALM:
        from_secret: e2e_mothertree_kc_realm
      E2E_MOTHERTREE_KC_CLIENT_SECRET:
        from_secret: e2e_mothertree_kc_client_secret
      E2E_INNBA_BASE_DOMAIN:
        from_secret: e2e_innba_base_domain
      E2E_INNBA_KC_REALM:
        from_secret: e2e_innba_kc_realm
      E2E_INNBA_KC_CLIENT_SECRET:
        from_secret: e2e_innba_kc_client_secret
    commands:
      - ci/scripts/ci-release-tenant.sh
