depends_on:
  - validate
  - build-images
  - e2e-shard-1
  - e2e-shard-2
  - e2e-shard-3
  - e2e-shard-4
  - e2e-shard-5
  - e2e-shard-6
  - e2e-shard-7
  - e2e-shard-8
  - e2e-shard-9
  - e2e-shard-10

when:
  - event: pull_request
  - event: push
    branch: main

skip_clone: true

steps:
  - name: complete
    image: bash
    commands:
      - elapsed=$(( $(date +%s) - CI_PIPELINE_CREATED ))
      - minutes=$((elapsed / 60))
      - seconds=$((elapsed % 60))
      - echo ""
      - echo "====================================="
      - echo "  All checks passed!"
      - 'echo "  Total build time: ${minutes}m ${seconds}s"'
      - echo "====================================="
      - echo ""
