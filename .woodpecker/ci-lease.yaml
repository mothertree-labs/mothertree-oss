when:
  - event: pull_request
  - event: push
    branch: main

clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      recursive: false

steps:
  - name: lease-tenant
    image: bash
    environment:
      CI: "true"
      CI_VALKEY_PASSWORD:
        from_secret: ci_valkey_password
      # Tenant + base_domain are only used here for log output. Keycloak
      # secrets moved to deploy-dev-prep's create-test-users step.
      E2E_POOL1_TENANT:
        from_secret: e2e_pool1_tenant
      E2E_POOL2_TENANT:
        from_secret: e2e_pool2_tenant
    commands:
      - ci/scripts/ci-lease-tenant.sh
