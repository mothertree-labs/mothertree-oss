depends_on:
  - e2e-setup
  - ci-lease
  - deploy-dev-finalize

when:
  - event: pull_request
  - event: push
    branch: main

clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      recursive: false

steps:
  - name: e2e-tests
    image: bash
    environment:
      E2E_SHARD: "10/10"
      CI: "true"
      CI_VALKEY_PASSWORD:
        from_secret: ci_valkey_password
      # Per-pool secrets — ci-resolve-tenant.sh maps the right ones
      E2E_POOL1_TENANT:
        from_secret: e2e_pool1_tenant
      E2E_POOL1_BASE_DOMAIN:
        from_secret: e2e_pool1_base_domain
      E2E_POOL1_STALWART_ADMIN_PASSWORD:
        from_secret: e2e_pool1_stalwart_admin_password
      E2E_POOL1_STALWART_IMAP_HOST:
        from_secret: e2e_pool1_stalwart_imap_host
      E2E_POOL1_STALWART_IMAP_PORT:
        from_secret: e2e_pool1_stalwart_imap_port
      E2E_POOL1_ECHO_GROUP_ADDRESS:
        from_secret: e2e_pool1_echo_group_address
      E2E_POOL2_TENANT:
        from_secret: e2e_pool2_tenant
      E2E_POOL2_BASE_DOMAIN:
        from_secret: e2e_pool2_base_domain
      E2E_POOL2_STALWART_ADMIN_PASSWORD:
        from_secret: e2e_pool2_stalwart_admin_password
      E2E_POOL2_STALWART_IMAP_HOST:
        from_secret: e2e_pool2_stalwart_imap_host
      E2E_POOL2_STALWART_IMAP_PORT:
        from_secret: e2e_pool2_stalwart_imap_port
      E2E_POOL2_ECHO_GROUP_ADDRESS:
        from_secret: e2e_pool2_echo_group_address
    commands:
      - ci/scripts/e2e-playwright.sh
      - ci/scripts/ci-renew-lease.sh

  # On-failure ONLY: dump roundcube + stalwart + keycloak pod logs/state while
  # the failing pods are still live, so a Roundcube-login failure (the chronic
  # shard-5/10 flake) names the broken layer instead of leaving an opaque
  # "inbox never appeared" timeout. Adds zero latency to green runs and no new
  # DAG edges. LINODE_CLI_TOKEN lives here (not the test step) so the powerful
  # token stays out of the Playwright-execution env. See ci-e2e-diagnostics.sh
  # and memory project_shard5_10_roundcube_login_root_cause.
  - name: roundcube-diagnostics
    image: bash
    when:
      - status: [ failure ]
    environment:
      CI: "true"
      CI_VALKEY_PASSWORD:
        from_secret: ci_valkey_password
      LINODE_CLI_TOKEN:
        from_secret: linode_token
      E2E_POOL1_TENANT:
        from_secret: e2e_pool1_tenant
      E2E_POOL2_TENANT:
        from_secret: e2e_pool2_tenant
      # Declared so Woodpecker MASKS the echo-group address if it surfaces in the
      # Stalwart mail round-trip grep (outbound to=<echo group>). The diagnostics
      # script does not otherwise read these — they are here for log redaction.
      E2E_POOL1_ECHO_GROUP_ADDRESS:
        from_secret: e2e_pool1_echo_group_address
      E2E_POOL2_ECHO_GROUP_ADDRESS:
        from_secret: e2e_pool2_echo_group_address
      E2E_SHARD: "10/10"
    commands:
      - ci/scripts/ci-e2e-diagnostics.sh
