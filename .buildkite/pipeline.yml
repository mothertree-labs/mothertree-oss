# Buildkite CI Pipeline for Mothertree
#
# E2E browser tests: start first (long-running), never block image builds
# Validation: runs on every push and PR
# Image builds: runs on every build after validation passes

steps:
  - group: ":playwright: E2E Browser Tests"
    steps:
      - label: ":playwright: E2E (1/3)"
        command: ".buildkite/scripts/e2e-playwright.sh"
        env:
          E2E_SHARD: "1/3"

      - label: ":playwright: E2E (2/3)"
        command: ".buildkite/scripts/e2e-playwright.sh"
        env:
          E2E_SHARD: "2/3"

      - label: ":playwright: E2E (3/3)"
        command: ".buildkite/scripts/e2e-playwright.sh"
        env:
          E2E_SHARD: "3/3"

  - group: ":mag: Validation"
    key: "validation"
    steps:
      - label: ":bash: ShellCheck"
        command: ".buildkite/scripts/shellcheck.sh"

      - label: ":terraform: Terraform Validate"
        command: ".buildkite/scripts/terraform-validate.sh"

      - label: ":helm: Helmfile Lint"
        command: ".buildkite/scripts/helmfile-lint.sh"

      - label: ":npm: npm build check"
        command: ".buildkite/scripts/npm-check.sh"

      - label: ":jest: Account Portal Tests"
        command: "cd apps/account-portal && npm ci --ignore-scripts && npm test"

      - label: ":jest: Admin Portal tests"
        command: ".buildkite/scripts/admin-portal-test.sh"

      - label: ":label: Version bump check"
        command: ".buildkite/scripts/version-check.sh"

  - group: ":docker: Build Images"
    depends_on: "validation"
    steps:
      - label: ":docker: Admin Portal"
        command: ".buildkite/scripts/build-image.sh admin-portal"

      - label: ":docker: Account Portal"
        command: ".buildkite/scripts/build-image.sh account-portal"

      - label: ":docker: Roundcube"
        command: ".buildkite/scripts/build-image.sh roundcube"

      - label: ":docker: k6 Perf"
        command: ".buildkite/scripts/build-image.sh perf"
