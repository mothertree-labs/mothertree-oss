---
# Configure Woodpecker CI Server
# Run: ansible-playbook -i inventory.yml playbook.yml
#
# Requires vars from ansible-vars.yml (private):
#   woodpecker_agent_secret, woodpecker_github_client, woodpecker_github_secret,
#   woodpecker_host, woodpecker_admin, cloudflare_tunnel_token,
#   ghcr_username, ghcr_pat

- name: Configure Woodpecker CI Server
  hosts: ci_servers
  become: true
  vars_files:
    - "{{ vars_file | default('ansible-vars.yml') }}"

  vars:
    woodpecker_version: "{{ woodpecker_version_override | default('3.13.0') }}"
    plugin_git_version: "{{ plugin_git_version_override | default('2.8.1') }}"

  tasks:
    # ── Remove Buildkite (cleanup from previous installation) ──────
    - name: Stop and disable Buildkite agent instances
      ansible.builtin.systemd:
        name: "buildkite-agent@{{ item }}"
        enabled: false
        state: stopped
      loop: [1, 2, 3]
      failed_when: false

    - name: Remove Buildkite agent package
      ansible.builtin.apt:
        name: buildkite-agent
        state: absent

    - name: Remove Buildkite apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/buildkite-agent-archive-keyring.gpg] https://apt.buildkite.com/buildkite-agent stable main"
        filename: buildkite-agent
        state: absent

    # ── Install Woodpecker (pinned .deb from GitHub releases) ──────
    - name: Download Woodpecker .deb packages
      ansible.builtin.get_url:
        url: "https://github.com/woodpecker-ci/woodpecker/releases/download/v{{ woodpecker_version }}/{{ item }}_{{ woodpecker_version }}_amd64.deb"
        dest: "/tmp/{{ item }}_{{ woodpecker_version }}_amd64.deb"
        mode: "0644"
      loop:
        - woodpecker-server
        - woodpecker-agent
        - woodpecker-cli

    - name: Install Woodpecker .deb packages
      ansible.builtin.apt:
        deb: "/tmp/{{ item }}_{{ woodpecker_version }}_amd64.deb"
      loop:
        - woodpecker-server
        - woodpecker-agent
        - woodpecker-cli

    # ── Install plugin-git (local backend clone step) ──────────────
    - name: Download plugin-git binary
      ansible.builtin.get_url:
        url: "https://github.com/woodpecker-ci/plugin-git/releases/download/{{ plugin_git_version }}/linux-amd64_plugin-git"
        dest: /usr/local/bin/plugin-git
        mode: "0755"

    # ── Install cloudflared ────────────────────────────────────────
    - name: Add Cloudflare apt key
      ansible.builtin.shell: |
        curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg \
          | gpg --dearmor -o /usr/share/keyrings/cloudflare-main.gpg
      args:
        creates: /usr/share/keyrings/cloudflare-main.gpg

    - name: Add Cloudflare apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main"
        filename: cloudflared

    - name: Install cloudflared
      ansible.builtin.apt:
        name: cloudflared
        state: present
        update_cache: true

    # ── Configure Woodpecker server ────────────────────────────────
    - name: Create Woodpecker config directory
      ansible.builtin.file:
        path: /etc/woodpecker
        state: directory
        mode: "0755"

    - name: Configure Woodpecker server environment
      ansible.builtin.template:
        src: templates/woodpecker-server.env.j2
        dest: /etc/woodpecker/woodpecker-server.env
        owner: root
        group: root
        mode: "0600"
      no_log: true
      notify: Restart Woodpecker server

    - name: Configure Woodpecker agent environment
      ansible.builtin.template:
        src: templates/woodpecker-agent.env.j2
        dest: /etc/woodpecker/woodpecker-agent.env
        owner: root
        group: root
        mode: "0600"
      no_log: true
      notify: Restart Woodpecker agent

    - name: Create woodpecker system user
      ansible.builtin.user:
        name: woodpecker
        system: true
        create_home: true
        shell: /bin/bash
        groups: docker
        append: true

    - name: Ensure agent.conf is writable by woodpecker user
      ansible.builtin.file:
        path: /etc/woodpecker/agent.conf
        state: touch
        owner: woodpecker
        group: woodpecker
        mode: "0644"

    - name: Pre-create shared Playwright browser cache with correct ownership
      ansible.builtin.file:
        path: /tmp/playwright-browsers
        state: directory
        owner: woodpecker
        group: woodpecker
        mode: "0755"

    - name: Override agent systemd unit (add server dependency + auto-restart)
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=WoodpeckerCI agent
          Documentation=https://woodpecker-ci.org/docs/administration/configuration/agent
          Requires=network.target woodpecker-server.service
          After=network.target woodpecker-server.service
          ConditionFileNotEmpty=/etc/woodpecker/woodpecker-agent.env
          ConditionPathExists=/etc/woodpecker/woodpecker-agent.env

          [Service]
          Type=simple
          EnvironmentFile=/etc/woodpecker/woodpecker-agent.env
          User=woodpecker
          Group=woodpecker
          ExecStart=/usr/local/bin/woodpecker-agent
          WorkingDirectory=/var/lib/woodpecker/
          StateDirectory=woodpecker
          Restart=on-failure
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
        dest: /usr/local/lib/systemd/system/woodpecker-agent.service
        mode: "0644"
      notify: Restart Woodpecker agent

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start Woodpecker server
      ansible.builtin.systemd:
        name: woodpecker-server
        enabled: true
        state: started

    - name: Enable and start Woodpecker agent
      ansible.builtin.systemd:
        name: woodpecker-agent
        enabled: true
        state: started

    # ── Configure Cloudflare Tunnel (dashboard-managed, token-based) ─
    - name: Install cloudflared systemd service
      ansible.builtin.shell: "cloudflared service install {{ cloudflare_tunnel_token }}"
      args:
        creates: /etc/systemd/system/cloudflared.service
      no_log: true

    - name: Enable and start cloudflared
      ansible.builtin.systemd:
        name: cloudflared
        enabled: true
        state: started

    # ── Docker Configuration ───────────────────────────────────────
    - name: Configure Docker daemon
      ansible.builtin.template:
        src: templates/docker-daemon.json.j2
        dest: /etc/docker/daemon.json
        mode: "0644"
      notify: Restart Docker

    - name: Create docker config directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: woodpecker
        group: woodpecker
        mode: "0700"
      loop:
        - /var/lib/woodpecker/.docker
        - /home/woodpecker/.docker

    - name: Configure GHCR docker login
      ansible.builtin.copy:
        content: |
          {
            "auths": {
              "ghcr.io": {
                "auth": "{{ (ghcr_username + ':' + ghcr_pat) | b64encode }}"
              }
            }
          }
        dest: "{{ item }}"
        owner: woodpecker
        group: woodpecker
        mode: "0600"
      loop:
        - /var/lib/woodpecker/.docker/config.json
        - /home/woodpecker/.docker/config.json
      no_log: true

    # ── Tools ──────────────────────────────────────────────────────
    - name: Install ShellCheck and git-lfs
      ansible.builtin.apt:
        name:
          - shellcheck
          - git-lfs
        state: present

    - name: Install Node.js 20 apt key
      ansible.builtin.shell: |
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key \
          | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
      args:
        creates: /usr/share/keyrings/nodesource.gpg

    - name: Add Node.js 20 apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main"
        filename: nodesource

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Install Playwright Chromium system dependencies
      ansible.builtin.shell: npx --yes playwright install-deps chromium
      args:
        creates: /usr/lib/x86_64-linux-gnu/libatk-1.0.so.0
      environment:
        HOME: /tmp

    - name: Install Terraform
      ansible.builtin.unarchive:
        src: https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip
        dest: /usr/local/bin
        remote_src: true
        mode: "0755"

    - name: Install Helm
      ansible.builtin.shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Install helmfile
      ansible.builtin.get_url:
        url: https://github.com/helmfile/helmfile/releases/download/v0.169.2/helmfile_0.169.2_linux_amd64.tar.gz
        dest: /tmp/helmfile.tar.gz
        mode: "0644"

    - name: Extract helmfile
      ansible.builtin.unarchive:
        src: /tmp/helmfile.tar.gz
        dest: /usr/local/bin
        remote_src: true
        include: [helmfile]
        mode: "0755"

    - name: Install kustomize (required by helmfile jsonPatches/strategicMergePatches)
      ansible.builtin.get_url:
        url: https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz
        dest: /tmp/kustomize.tar.gz
        mode: "0644"

    - name: Extract kustomize
      ansible.builtin.unarchive:
        src: /tmp/kustomize.tar.gz
        dest: /usr/local/bin
        remote_src: true
        include: [kustomize]
        mode: "0755"

    - name: Install yq
      ansible.builtin.get_url:
        url: https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64
        dest: /usr/local/bin/yq
        mode: "0755"

    # ── Valkey (Redis-compatible KV store for CI tenant leasing) ────
    # Runs as a Docker container on the ci-shared network.
    # Pipeline steps also use ci-shared (via WOODPECKER_BACKEND_DOCKER_NETWORK)
    # so they can reach Valkey by container name: valkey-cli -h valkey.
    - name: Create ci-shared Docker network
      ansible.builtin.shell: docker network create ci-shared 2>/dev/null || true
      changed_when: false

    - name: Run Valkey container on ci-shared network
      ansible.builtin.shell: |
        docker rm -f valkey 2>/dev/null || true
        docker run -d \
          --name valkey \
          --network ci-shared \
          --restart unless-stopped \
          valkey/valkey:8-alpine \
          valkey-server --save "" --appendonly no --maxmemory 16mb --maxmemory-policy allkeys-lru
      register: valkey_result
      changed_when: true

    - name: Wait for Valkey to be ready
      ansible.builtin.shell: |
        for i in $(seq 1 10); do
          docker exec valkey valkey-cli ping && exit 0
          sleep 1
        done
        exit 1
      register: valkey_ping
      changed_when: false

    # ── SSH Deploy Keys ────────────────────────────────────────────
    - name: Create woodpecker .ssh directory
      ansible.builtin.file:
        path: /home/woodpecker/.ssh
        state: directory
        owner: woodpecker
        group: woodpecker
        mode: "0700"

    - name: Install SSH deploy keys
      ansible.builtin.copy:
        content: "{{ item.key }}"
        dest: "/home/woodpecker/.ssh/{{ item.name }}"
        owner: woodpecker
        group: woodpecker
        mode: "0600"
      loop: "{{ ssh_deploy_keys | default([]) }}"
      no_log: true

    - name: Configure SSH host aliases for private repos
      ansible.builtin.copy:
        content: |
          # Deploy key aliases for private submodules and config repos
          {% for key in ssh_deploy_keys | default([]) %}
          Host {{ key.host_alias }}
            HostName github.com
            User git
            IdentityFile /home/woodpecker/.ssh/{{ key.name }}
            IdentitiesOnly yes
          {% endfor %}

          Host github.com
            StrictHostKeyChecking accept-new
        dest: /home/woodpecker/.ssh/config
        owner: woodpecker
        group: woodpecker
        mode: "0600"

    # ── Docker Buildx ──────────────────────────────────────────────
    - name: Set up default buildx builder
      ansible.builtin.shell: |
        docker buildx create --name mt-builder --driver docker-container --bootstrap --use
      become: true
      become_user: woodpecker
      args:
        creates: /home/woodpecker/.docker/buildx

  handlers:
    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted

    - name: Restart Woodpecker server
      ansible.builtin.systemd:
        name: woodpecker-server
        state: restarted

    - name: Restart Woodpecker agent
      ansible.builtin.systemd:
        name: woodpecker-agent
        state: restarted

